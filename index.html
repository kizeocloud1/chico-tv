<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chico TV - En Vivo</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.compiled.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #1e1e1e; overflow-y: auto; border-right: 1px solid #333; }
        #main { flex-grow: 1; display: flex; flex-direction: column; }
        #player-container { width: 100%; aspect-ratio: 16/9; background: black; }
        video { width: 100%; height: 100%; }
        .category { padding: 15px; background: #2a2a2a; border-bottom: 1px solid #333; cursor: pointer; }
        .category:hover { background: #3d3d3d; }
        .channel-list { display: none; padding: 10px; background: #1a1a1a; }
        .channel-item { display: flex; align-items: center; padding: 8px; cursor: pointer; border-radius: 4px; margin-bottom: 5px; }
        .channel-item:hover { background: #333; }
        .channel-item img { width: 30px; height: 30px; margin-right: 10px; border-radius: 4px; }
        .active { display: block; }
        h1 { font-size: 1.2rem; padding: 20px; margin: 0; background: #000; color: #ffeb3b; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>CHICO TV</h1>
    <div id="menu-container">
        </div>
</div>

<div id="main">
    <div id="player-container">
        <video id="videoPlayer" controls autoplay></video>
    </div>
    <div id="channel-info" style="padding: 20px;">
        <h2 id="current-channel-name">Selecciona un canal</h2>
    </div>
</div>

<script>
    const JSON_URL = 'comunJakare.json'; // O 'common.json'
    let player;

    async function initApp() {
        shaka.polyfill.installAll();
        if (shaka.Player.isBrowserSupported()) {
            player = new shaka.Player(document.getElementById('videoPlayer'));
            player.addEventListener('error', onErrorEvent);
            loadMenu();
        } else {
            console.error('Navegador no soportado');
        }
    }

    async function loadMenu() {
        try {
            const response = await fetch(JSON_URL);
            const data = await response.json();
            const container = document.getElementById('menu-container');

            data.forEach((cat, index) => {
                const catDiv = document.createElement('div');
                catDiv.className = 'category';
                catDiv.innerText = cat.title;
                catDiv.onclick = () => {
                    const lists = document.querySelectorAll('.channel-list');
                    lists.forEach(l => l.classList.remove('active'));
                    document.getElementById(`cat-${index}`).classList.add('active');
                };

                const listDiv = document.createElement('div');
                listDiv.className = 'channel-list';
                listDiv.id = `cat-${index}`;

                cat.items.forEach(item => {
                    const chanDiv = document.createElement('div');
                    chanDiv.className = 'channel-item';
                    chanDiv.innerHTML = `<img src="${item.icono}" onerror="this.src='https://via.placeholder.com/30'"> <span>${item.name}</span>`;
                    chanDiv.onclick = () => playChannel(item);
                    listDiv.appendChild(chanDiv);
                });

                container.appendChild(catDiv);
                container.appendChild(listDiv);
            });
        } catch (e) {
            console.error("Error cargando el JSON", e);
        }
    }

    async function playChannel(item) {
        document.getElementById('current-channel-name').innerText = item.name;
        
        // Configuración de DRM si es CLEARKEY
        if (item.type === "CLEARKEY" && item.drm_license_uri) {
            try {
                const drmRes = await fetch(item.drm_license_uri);
                const drmData = await drmRes.json();
                // Shaka requiere el formato { 'hex_key_id': 'hex_key' }
                player.configure({
                    drm: { clearKeys: drmData.keys ? formatClearKeys(drmData.keys) : drmData }
                });
            } catch (e) {
                console.warn("No se pudo cargar la licencia ClearKey", e);
            }
        } else {
            player.configure({ drm: { clearKeys: {} } }); // Limpiar si no es DRM
        }

        try {
            await player.load(item.url);
        } catch (e) {
            onError(e);
        }
    }

    function formatClearKeys(keys) {
        const ck = {};
        keys.forEach(k => ck[k.kid.replace(/-/g, '')] = k.k.replace(/-/g, ''));
        return ck;
    }

    function onErrorEvent(event) { onError(event.detail); }
    function onError(error) { console.error('Error code', error.code, 'object', error); }

    document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>
