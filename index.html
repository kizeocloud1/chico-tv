<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chico TV - Web Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.compiled.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #111; border-right: 1px solid #333; overflow-y: auto; }
        #main { flex: 1; display: flex; flex-direction: column; }
        .chan-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; display: flex; align-items: center; }
        .chan-item:hover { background: #333; }
        .chan-item img { width: 30px; height: 30px; margin-right: 10px; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; }
        .error-box { padding: 15px; color: #ff5252; font-size: 13px; background: #1a0000; border: 1px solid red; margin: 10px; display: none; }
        .badge { background: #ffeb3b; color: #000; padding: 2px 5px; font-size: 10px; font-weight: bold; border-radius: 3px; margin-left: 5px; }
    </style>
</head>
<body>

<div id="sidebar"><div id="menu"></div></div>
<div id="main">
    <video id="video" controls autoplay></video>
    <div id="error-display" class="error-box"></div>
    <div style="padding:20px;">
        <h2 id="title">Selecciona un canal</h2>
        <p id="debug-info" style="color: #888; font-size: 11px;"></p>
    </div>
</div>

<script>
    let player;

    async function init() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        player = new shaka.Player(video);

        // CONFIGURACIÓN CRÍTICA: Ignorar errores de certificados y reintentar
        player.configure({
            streaming: {
                retryParameters: { maxAttempts: 3, baseDelay: 1000 },
                lowLatencyMode: true,
            },
            manifest: { retryParameters: { maxAttempts: 3 } }
        });

        player.addEventListener('error', (e) => showError(e.detail));
        loadList();
    }

    async function loadList() {
        const res = await fetch('comunJakare.json');
        const data = await res.json();
        const menu = document.getElementById('menu');
        
        data.forEach(cat => {
            cat.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'chan-item';
                const isHttp = item.url.startsWith('http:');
                div.innerHTML = `
                    <img src="${item.icono}"> 
                    <span>${item.name}</span>
                    ${isHttp ? '<span class="badge">HTTP</span>' : ''}
                `;
                div.onclick = () => play(item);
                menu.appendChild(div);
            });
        });
    }

    // Convertidor Base64 a Hex (Indispensable para ClearKey en Web)
    function b64ToHex(str) {
        const raw = atob(str.replace(/-/g, '+').replace(/_/g, '/'));
        let result = '';
        for (let i = 0; i < raw.length; i++) {
            const hex = raw.charCodeAt(i).toString(16);
            result += (hex.length === 2 ? hex : '0' + hex);
        }
        return result;
    }

    async function play(item) {
        const errBox = document.getElementById('error-display');
        const debug = document.getElementById('debug-info');
        errBox.style.display = 'none';
        document.getElementById('title').innerText = item.name;
        debug.innerText = `URL: ${item.url}`;

        // RESET DRM
        player.configure({ drm: { clearKeys: {} } });

        // 1. SOLUCIÓN MIXED CONTENT (HTTPS vs HTTP)
        if (location.protocol === 'https:' && item.url.startsWith('http:')) {
            showError({ code: "MIXED_CONTENT", message: "Bloqueado por seguridad: No puedes ver links HTTP en una web HTTPS (GitHub)." });
            return;
        }

        // 2. SOLUCIÓN DRM / DROPBOX
        if (item.type === "CLEARKEY" && item.drm_license_uri) {
            try {
                // Forzar descarga de Dropbox
                const licUrl = item.drm_license_uri.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '?dl=1');
                const response = await fetch(licUrl);
                const drmData = await response.json();
                
                let keys = {};
                if (drmData.keys) {
                    drmData.keys.forEach(k => {
                        keys[b64ToHex(k.kid)] = b64ToHex(k.k);
                    });
                }
                player.configure({ drm: { clearKeys: keys } });
            } catch (e) {
                console.error("Error cargando llaves", e);
            }
        }

        try {
            await player.load(item.url);
        } catch (e) {
            showError(e);
        }
    }

    function showError(error) {
        const box = document.getElementById('error-display');
        box.style.display = 'block';
        if (error.code === 1002 || error.code === 1001) {
            box.innerHTML = `<strong>Error de Red (CORS):</strong> El servidor del canal no permite la reproducción en webs externas. <br> <small>Prueba abriendo este archivo directamente desde tu PC (sin GitHub) o usa un navegador con CORS habilitado.</small>`;
        } else {
            box.innerText = `Error ${error.code}: ${error.message || 'Problema con la fuente'}`;
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
