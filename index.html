<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chico TV - Stream</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mux.js/6.0.1/mux.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.10/dist/shaka-player.compiled.js"></script>

    <style>
        /* Estética Dark Mode Profesional */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0a0a0a; font-family: 'Segoe UI', Roboto, sans-serif; color: #fff; overflow-x: hidden; }
        .app { max-width: 1600px; margin: 0 auto; padding: 1rem; }

        /* Header Estilizado */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #2c2c2c;
            padding-bottom: 0.75rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E50914, #FF6B00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .status { font-size: 0.75rem; color: #0f0; background: #1a1a1a; padding: 4px 12px; border-radius: 20px; }

        /* Categorías (Navegación horizontal) */
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: #1e1e1e;
            border: 1px solid #333;
            color: #ccc;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }
        .cat-btn.active, .cat-btn:focus {
            background: #E50914;
            color: #fff;
            border-color: #E50914;
            outline: none;
        }

        /* Grilla de Canales */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: #141414;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #222;
            transition: transform 0.2s;
        }
        .card:focus, .card.active {
            transform: scale(1.05);
            border-color: #E50914;
            outline: none;
        }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #222; }
        .card-name { padding: 8px; font-size: 0.8rem; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Reproductor */
        .player-box {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        video { width: 100%; height: 100%; }
        
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #E50914; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box { color: #ff6b6b; font-size: 0.9rem; text-align: center; margin-top: 10px; display: none; }
        
        footer { text-align: center; padding: 2rem; color: #444; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo">CHICO TV</div>
        <div id="loadingStatus" class="status">Sincronizando...</div>
    </div>

    <div id="catContainer" class="categories"></div>
    <div id="chanGrid" class="grid"></div>

    <div class="player-box">
        <video id="video" controls autoplay playsinline></video>
        <div id="loader" class="overlay"><div class="spinner"></div></div>
    </div>
    
    <div id="errorMsg" class="error-box"></div>
    
    <footer>Soporte DASH/HLS/ClearKey · Datos remotos desde GitHub</footer>
</div>

<script>
    // Configuración de GitHub
    const REPO = "https://raw.githubusercontent.com/killermina/prueba/main/";
    const FILES = ["common.json", "comunJakare.json"];

    let player = null;
    let video = document.getElementById('video');
    let allData = [];

    // 1. Inicializar Shaka Player
    async function initPlayer() {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            alert("Navegador no compatible");
            return;
        }
        player = new shaka.Player(video);
        player.addEventListener('error', (e) => {
            console.error("Error Shaka:", e.detail.code);
            document.getElementById('errorMsg').innerText = "Error " + e.detail.code + ": Revisa la señal en el JSON.";
            document.getElementById('errorMsg').style.display = "block";
            document.getElementById('loader').style.display = "none";
        });
    }

    // 2. Cargar JSONs dinámicamente
    async function loadData() {
        try {
            for (const file of FILES) {
                const res = await fetch(REPO + file);
                const data = await res.json();
                if (Array.isArray(data)) allData.push(...data);
            }
            
            const categories = allData.filter(c => c.type === "category");
            if (categories.length > 0) {
                renderCategories(categories);
                renderChannels(categories[0].title);
                document.getElementById('loadingStatus').innerText = "En línea";
            }
        } catch (err) {
            console.error("Error cargando datos:", err);
            document.getElementById('loadingStatus').innerText = "Error de conexión";
        }
    }

    // 3. Renderizar Interfaz
    function renderCategories(cats) {
        const container = document.getElementById('catContainer');
        container.innerHTML = '';
        cats.forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn' + (index === 0 ? ' active' : '');
            btn.innerText = cat.title;
            btn.onclick = () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderChannels(cat.title);
            };
            container.appendChild(btn);
        });
    }

    function renderChannels(title) {
        const grid = document.getElementById('chanGrid');
        grid.innerHTML = '';
        const category = allData.find(c => c.title === title);
        
        category.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.tabIndex = 0;
            card.innerHTML = `
                <img src="${item.icono || 'https://via.placeholder.com/150x84/111/333?text=TV'}" onerror="this.src='https://via.placeholder.com/150x84/111/333?text=TV'">
                <div class="card-name">${item.name}</div>
            `;
            card.onclick = () => play(item);
            card.onkeydown = (e) => { if(e.key === 'Enter') play(item); };
            grid.appendChild(card);
        });
    }

    // 4. Lógica de Reproducción (Solución Error 1002)
    async function play(item) {
        if (!item.url) return;
        
        document.getElementById('loader').style.display = "flex";
        document.getElementById('errorMsg').style.display = "none";
        
        try {
            await player.unload();

            // Configurar Headers si existen en el JSON
            const netEngine = player.getNetworkingEngine();
            netEngine.clearRequestFilters();
            if (item.headers || item.user) {
                netEngine.registerRequestFilter((type, request) => {
                    if (item.headers) item.headers.forEach(h => request.headers[h.name] = h.value);
                    if (item.user) request.headers['User-Agent'] = item.user;
                });
            }

            // Configurar DRM ClearKey si aplica
            if (item.type === "CLEARKEY" && item.drm_license_uri) {
                player.configure({
                    drm: { servers: { 'org.w3.clearkey': item.drm_license_uri } }
                });
            } else {
                player.configure({ drm: { servers: {} } });
            }

            await player.load(item.url);
            document.getElementById('loader').style.display = "none";
            video.play();
        } catch (e) {
            console.error("Fallo al cargar canal:", e);
        }
    }

    // Iniciar
    initPlayer().then(loadData);
</script>

</body>
</html>
