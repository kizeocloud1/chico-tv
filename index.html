<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chico TV - Web Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.compiled.js"></script>
    <style>
        :root { --accent: #ffeb3b; --bg-dark: #0a0a0a; --panel: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 300px; background: var(--panel); border-right: 1px solid #333; overflow-y: auto; }
        #main { flex: 1; display: flex; flex-direction: column; background: #000; }
        .header { padding: 20px; text-align: center; border-bottom: 2px solid var(--accent); background: #000; }
        .cat-btn { width: 100%; padding: 15px; border: none; background: #222; color: white; text-align: left; cursor: pointer; border-bottom: 1px solid #333; }
        .chan-list { display: none; background: #111; }
        .chan-item { display: flex; align-items: center; padding: 10px; cursor: pointer; transition: 0.2s; }
        .chan-item:hover { background: #333; }
        .chan-item img { width: 35px; height: 35px; border-radius: 5px; margin-right: 10px; }
        #video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        .active { display: block; }
        .loading-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
        #error-msg { color: #ff5252; padding: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header"> <h2 style="margin:0; color:var(--accent)">CHICO TV</h2> </div>
    <div id="menu"></div>
</div>

<div id="main">
    <div id="video-container">
        <video id="video" controls autoplay></video>
        <div id="loader" class="loading-overlay">Cargando...</div>
    </div>
    <div style="padding: 20px;">
        <h3 id="playing-title" style="margin:0">Selecciona un canal</h3>
        <div id="error-msg"></div>
    </div>
</div>

<script>
    let player;
    const JSON_DATA = 'comunJakare.json';

    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        player = new shaka.Player(video);

        player.addEventListener('error', (e) => {
            console.error('Error Shaka:', e.detail);
            document.getElementById('error-msg').innerText = "Error de Fuente: Asegúrate que el link sea HTTPS y tenga CORS.";
        });

        loadMenu();
    }

    async function loadMenu() {
        try {
            const res = await fetch(JSON_DATA);
            const categories = await res.json();
            const menu = document.getElementById('menu');

            categories.forEach((cat, i) => {
                if (!cat.items || cat.items.length === 0) return;
                
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.innerText = cat.title;
                btn.onclick = () => {
                    const lists = document.querySelectorAll('.chan-list');
                    lists.forEach(l => l.classList.remove('active'));
                    document.getElementById('list-' + i).classList.toggle('active');
                };

                const list = document.createElement('div');
                list.className = 'chan-list';
                list.id = 'list-' + i;

                cat.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'chan-item';
                    div.innerHTML = `<img src="${item.icono}"> <span>${item.name}</span>`;
                    div.onclick = () => play(item);
                    list.appendChild(div);
                });

                menu.appendChild(btn);
                menu.appendChild(list);
            });
        } catch (e) { console.error("Error cargando JSON", e); }
    }

    // Función para convertir Base64 de las llaves a Hexadecimal (lo que pide el navegador)
    function base64ToHex(base64) {
        const raw = atob(base64.replace(/-/g, '+').replace(/_/g, '/'));
        let result = '';
        for (let i = 0; i < raw.length; i++) {
            const hex = raw.charCodeAt(i).toString(16);
            result += (hex.length === 2 ? hex : '0' + hex);
        }
        return result.toLowerCase();
    }

    async function play(item) {
        document.getElementById('playing-title').innerText = item.name;
        document.getElementById('error-msg').innerText = "";
        
        // Limpiar configuración previa
        player.configure({ drm: { clearKeys: {} } });

        if (item.type === "CLEARKEY" && item.drm_license_uri) {
            try {
                // Ajustar link de Dropbox para que sea descarga directa
                let licenseUrl = item.drm_license_uri.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '?dl=1');
                
                const res = await fetch(licenseUrl);
                const drmJson = await res.json();
                
                let keys = {};
                // Si el formato es JWK (típico de Dropbox en tus archivos)
                if (drmJson.keys) {
                    drmJson.keys.forEach(k => {
                        keys[base64ToHex(k.kid)] = base64ToHex(k.k);
                    });
                } else {
                    keys = drmJson;
                }

                player.configure({
                    drm: { clearKeys: keys }
                });
            } catch (e) {
                console.warn("No se pudo aplicar ClearKey, intentando sin DRM...", e);
            }
        }

        try {
            await player.load(item.url);
        } catch (e) {
            console.error("Error cargando el video:", e);
        }
    }

    document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
