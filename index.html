<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chico TV Online</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.10/dist/shaka-player.compiled.js"></script>
    <style>
        :root { --main-color: #ffeb3b; --bg: #000; --panel: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 300px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; }
        #main { flex: 1; position: relative; display: flex; flex-direction: column; }
        .header { padding: 20px; text-align: center; border-bottom: 2px solid var(--main-color); }
        #menu { flex: 1; overflow-y: auto; padding: 10px; }
        .cat-group { margin-bottom: 10px; }
        .cat-title { width: 100%; padding: 12px; background: #222; border: none; color: var(--main-color); text-align: left; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .chan-list { display: none; padding-top: 5px; }
        .chan-list.active { display: block; }
        .chan-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-radius: 4px; font-size: 14px; }
        .chan-item:hover { background: #333; }
        .chan-item img { width: 30px; height: 30px; margin-right: 10px; border-radius: 4px; object-fit: cover; }
        #video-container { width: 100%; background: #000; position: relative; }
        video { width: 100%; aspect-ratio: 16/9; outline: none; }
        .info { padding: 20px; }
        #error-log { color: #ff5252; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header"> <h2 style="margin:0">CHICO TV</h2> </div>
    <div id="menu"></div>
</div>

<div id="main">
    <div id="video-container">
        <video id="video" controls autoplay></video>
    </div>
    <div class="info">
        <h3 id="current-title" style="margin:0">Selecciona un canal</h3>
        <div id="error-log"></div>
    </div>
</div>

<script>
    let player;

    async function init() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        player = new shaka.Player(video);

        // Configuramos para que sea más tolerante a fallos de red (como en Android)
        player.configure({
            streaming: { 
                retryParameters: { maxAttempts: 5 },
                jumpLargeGaps: true
            }
        });

        player.addEventListener('error', onPlayerError);
        loadData();
    }

    async function loadData() {
        try {
            const res = await fetch('comunJakare.json');
            const data = await res.json();
            const menu = document.getElementById('menu');

            data.forEach((cat, i) => {
                const group = document.createElement('div');
                group.className = 'cat-group';
                
                const btn = document.createElement('button');
                btn.className = 'cat-title';
                btn.innerText = cat.title;
                btn.onclick = () => group.querySelector('.chan-list').classList.toggle('active');

                const list = document.createElement('div');
                list.className = 'chan-list';

                cat.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'chan-item';
                    div.innerHTML = `<img src="${item.icono || 'https://i.ibb.co/67Vth99Q/tv-Cico.png'}"> <span>${item.name}</span>`;
                    div.onclick = () => play(item);
                    list.appendChild(div);
                });

                group.appendChild(btn);
                group.appendChild(list);
                menu.appendChild(group);
            });
        } catch (e) { console.error("Error JSON:", e); }
    }

    // Convierte las llaves de Dropbox (Base64) al formato que Shaka entiende (Hex)
    function decodeKey(b64) {
        const bin = atob(b64.replace(/-/g, '+').replace(/_/g, '/'));
        let hex = '';
        for (let i = 0; i < bin.length; i++) {
            const h = bin.charCodeAt(i).toString(16);
            hex += (h.length === 1 ? '0' + h : h);
        }
        return hex;
    }

    async function play(item) {
        const errorLog = document.getElementById('error-log');
        document.getElementById('current-title').innerText = item.name;
        errorLog.innerText = "";

        // Reset DRM previo
        player.configure({ drm: { clearKeys: {} } });

        // Si el link es HTTP y tu web HTTPS, avisamos
        if (item.url.startsWith('http://') && window.location.protocol === 'https:') {
            errorLog.innerText = "⚠️ Error: El navegador bloquea links HTTP en sitios HTTPS. Intenta usar Brave o desactivar 'Shields'.";
        }

        if (item.type === "CLEARKEY" && item.drm_license_uri) {
            try {
                // Forzamos descarga directa de Dropbox
                const licenseUrl = item.drm_license_uri.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '?dl=1');
                const res = await fetch(licenseUrl);
                const drm = await res.json();
                
                let keys = {};
                if (drm.keys) {
                    drm.keys.forEach(k => {
                        keys[decodeKey(k.kid)] = decodeKey(k.k);
                    });
                }
                
                player.configure({ drm: { clearKeys: keys } });
            } catch (e) {
                console.error("Error DRM:", e);
            }
        }

        try {
            await player.load(item.url);
        } catch (e) {
            onPlayerError(e);
        }
    }

    function onPlayerError(e) {
        const error = e.detail || e;
        document.getElementById('error-log').innerText = `Error ${error.code}: Problema de conexión o restricciones del navegador (CORS/HTTP).`;
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
